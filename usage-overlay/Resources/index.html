<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>卡卡用量</title>
  <style>
    :root {
      color-scheme: dark;
      --yellow: #ffd44a;
      --text: rgba(238, 247, 255, 0.96);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 4px;
    }

    .usage-card {
      width: 132px;
      min-height: 34px;
      padding: 1px 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 5px;
      opacity: 0.88;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.52));
      pointer-events: none;
    }

    .bar {
      position: relative;
      width: 132px;
      height: 12px;
      overflow: hidden;
      border: 0;
      border-radius: 999px;
      background: rgba(63, 140, 255, 0.16);
      box-shadow: none;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2878f3, #5aa8ff);
      transition: width 700ms cubic-bezier(.2, .8, .2, 1);
    }

    .percent {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: white;
      font-size: 8px;
      font-weight: 760;
      line-height: 10px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.78);
    }

    .today-line {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 4px;
      min-width: 0;
      white-space: nowrap;
    }

    .today-label {
      color: var(--yellow);
      font-size: 10px;
      font-weight: 720;
      line-height: 13px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    .today-value {
      max-width: 100%;
      overflow: hidden;
      color: var(--text);
      font-size: 10px;
      font-weight: 680;
      line-height: 13px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.56);
    }

    .loading .percent,
    .loading .today-value {
      opacity: 0.55;
    }
  </style>
</head>
<body class="loading">
  <section class="usage-card" aria-label="卡卡用量">
    <div class="bar" id="weekBar" role="progressbar" aria-label="本周剩余额度" aria-valuemin="0" aria-valuemax="100">
      <div class="bar-fill" id="barFill"></div>
      <strong class="percent" id="percent">—</strong>
    </div>
    <div class="today-line" id="todayLine">
      <span class="today-label">Today:</span>
      <strong class="today-value" id="dailyTokens">—</strong>
    </div>
  </section>

  <script>
    const weekBar = document.getElementById("weekBar");
    const barFill = document.getElementById("barFill");
    const percent = document.getElementById("percent");
    const dailyTokens = document.getElementById("dailyTokens");

    function formatTokens(value) {
      if (!Number.isFinite(value)) return "—";
      if (value >= 1_000_000_000) return `${(value / 1_000_000_000).toFixed(2).replace(/\.00$/, "")}B`;
      if (value >= 1_000_000) return `${(value / 1_000_000).toFixed(2).replace(/\.00$/, "")}M`;
      if (value >= 1_000) return `${(value / 1_000).toFixed(1).replace(/\.0$/, "")}K`;
      return new Intl.NumberFormat("en-US").format(value);
    }

    window.__kakaUpdate = function update(snapshot) {
      const remaining = snapshot?.remainingPercent == null
        ? Number.NaN
        : Number(snapshot.remainingPercent);
      if (Number.isFinite(remaining)) {
        const clamped = Math.min(100, Math.max(0, Math.round(remaining)));
        percent.textContent = `${clamped}%`;
        barFill.style.width = `${clamped}%`;
        weekBar.setAttribute("aria-valuenow", String(clamped));
      } else {
        percent.textContent = "—";
        barFill.style.width = "0%";
        weekBar.removeAttribute("aria-valuenow");
      }

      const tokens = snapshot?.dailyTokens == null
        ? Number.NaN
        : Number(snapshot.dailyTokens);
      dailyTokens.textContent = formatTokens(tokens);
      document.body.classList.remove("loading");
    };
  </script>
</body>
</html>
